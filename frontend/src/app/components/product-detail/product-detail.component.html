<div class="product-detail" *ngIf="!isLoading && product">
  <h2>{{ product.Name }}</h2>
  <div class="detail-content">
    <div class="product-image">
      <img [src]="product.Image" alt="{{ product.Name }}">
    </div>
    <div class="product-info">
      <p><strong>Category:</strong> {{ product.Category }}</p>
      <p><strong>Source:</strong> {{ product.Source }}</p>
      <p><strong>Price:</strong> ${{ product.Price }}</p>
      <a [href]="product.Link" target="_blank" class="btn-buy">View on Store</a>
    </div>
  </div>
</div>
<div *ngIf="isLoading" class="loading">Loading product details...</div>
